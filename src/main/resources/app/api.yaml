openapi: 3.0.0
info:
  title: Sample API
  description: A sample API for demonstration purposes
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/hello:
    get:
      summary: Say hello
      description: Returns a simple hello message
      responses:
        '200':
          description: A successful response
          content:
            text/plain:
              schema:
                type: string
  /api/greeting:
    get:
      summary: Greet a user
      description: Returns a personalized greeting
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: A successful response
          content:
            text/plain:
              schema:
                type: string
components:
  schemas:
    Greeting:
      type: object
      properties:
        message:
          type: string